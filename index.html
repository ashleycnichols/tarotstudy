<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1a0f24" />
<title>The Arcane Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold-light:#e8c96a;--maroon:#7a1f3d;--purple:#6b3fa0;--purple-light:#9b6fd4;--text-main:#f0e6ff;--text-dim:#c4a8e0;--bg:#1a0f24;--bg2:#241535;}
body{background:var(--bg);background-image:radial-gradient(ellipse at 15% 15%,rgba(107,63,160,.18) 0%,transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(122,31,61,.15) 0%,transparent 50%);color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:16px;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:0 16px 80px}
.header{text-align:center;padding:32px 0 24px;position:relative}
.header::after{content:'';display:block;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin-top:20px}
.htitle{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:clamp(1.3rem,4vw,2rem);color:var(--gold-light);letter-spacing:.04em;text-shadow:0 0 40px rgba(201,168,76,.4),0 0 80px rgba(107,63,160,.3);line-height:1.3}
.hsub{font-family:'Cinzel','Palatino Linotype',serif;font-size:.72rem;color:var(--purple-light);letter-spacing:.25em;text-transform:uppercase;margin-top:8px}
.hset{position:absolute;top:32px;right:0;background:none;border:1px solid rgba(107,63,160,.3);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--text-dim);font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.hset:hover{border-color:var(--purple-light);color:var(--gold-light)}
.nav{display:flex;gap:4px;margin:24px 0;border:1px solid rgba(107,63,160,.3);border-radius:4px;padding:4px;background:rgba(26,15,36,.6)}
.nbtn{flex:1;padding:9px 6px;background:none;border:none;color:var(--text-dim);font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s}
.nbtn:hover{color:var(--gold-light);background:rgba(107,63,160,.12)}
.nbtn.active{background:rgba(107,63,160,.2);color:var(--gold-light);border:1px solid rgba(201,168,76,.35)}
.prog-wrap{margin-bottom:24px}
.prog-lbl{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-lbl .pt{font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim)}
.prog-lbl .pc{font-size:.9rem;color:var(--gold)}
.prog-track{height:3px;background:rgba(107,63,160,.2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(to right,var(--purple),var(--gold-light));border-radius:2px;transition:width .6s ease}
.sec-title{font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--purple-light);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(107,63,160,.25)}
.btn{padding:9px 18px;border-radius:4px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1px solid}
.btn-p{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold-light)}
.btn-p:hover{background:rgba(201,168,76,.22)}
.btn-p:disabled{opacity:.4;cursor:default}
.btn-g{background:none;border-color:rgba(107,63,160,.35);color:var(--text-dim)}
.btn-g:hover{border-color:var(--purple-light);color:var(--text-main)}
.spinner{width:18px;height:18px;border:2px solid rgba(155,111,212,.3);border-top-color:var(--purple-light);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading p{font-family:'Cinzel','Palatino Linotype',serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--purple-light)}
.sph{text-align:center;padding:50px 20px;color:var(--text-dim)}
.sph-icon{font-size:2.5rem;margin-bottom:16px;opacity:.35}
.sph h3{font-family:'Cinzel','Palatino Linotype',serif;font-size:.95rem;color:var(--gold);margin-bottom:8px;letter-spacing:.1em}
.sph p{font-style:italic;font-size:.9rem;line-height:1.6}
.onboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.osigil{font-size:3rem;margin-bottom:24px}
.otitle{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:clamp(1.2rem,4vw,1.8rem);color:var(--gold-light);letter-spacing:.04em;text-shadow:0 0 40px rgba(201,168,76,.4);margin-bottom:10px;line-height:1.3}
.osub{font-family:'Cinzel','Palatino Linotype',serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--purple-light);margin-bottom:32px}
.ocard{width:100%;max-width:400px;background:rgba(36,21,53,.8);border:1px solid rgba(107,63,160,.35);border-radius:10px;padding:28px 24px;text-align:left}
.olabel{font-family:'Cinzel','Palatino Linotype',serif;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-light);margin-bottom:8px;display:block}
.odesc{font-size:.86rem;color:var(--text-dim);font-style:italic;line-height:1.6;margin-bottom:16px}
.oinput{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(107,63,160,.4);border-radius:4px;padding:11px 13px;color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:1rem;margin-bottom:14px;outline:none;transition:border-color .2s}
.oinput:focus{border-color:var(--purple-light)}
.oinput::placeholder{color:rgba(196,168,224,.3)}
.oerr{color:#c97070;font-size:.8rem;margin-bottom:10px;font-style:italic}
.ohint{font-size:.76rem;color:var(--text-dim);margin-top:12px;line-height:1.5;opacity:.7}
.ohint a{color:var(--purple-light)}
.set-panel{background:rgba(36,21,53,.95);border:1px solid rgba(107,63,160,.4);border-radius:8px;padding:20px;margin-bottom:24px}
.set-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.set-inp{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(107,63,160,.4);border-radius:4px;padding:9px 12px;color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:.95rem;outline:none;transition:border-color .2s}
.kstatus{font-size:.74rem;font-style:italic;color:#7abf7a;margin-top:8px}
/* Library */
.lib-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.fchip{padding:4px 12px;border-radius:20px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(107,63,160,.3);color:var(--text-dim);background:none;transition:all .2s}
.fchip:hover{border-color:var(--purple-light);color:var(--text-main)}
.fchip.active{background:rgba(107,63,160,.2);border-color:var(--purple-light);color:var(--gold-light)}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:8px}
.lcard{position:relative;aspect-ratio:2/3;border-radius:5px;overflow:hidden;border:1px solid rgba(107,63,160,.2);cursor:pointer;transition:all .2s;background:rgba(107,63,160,.05)}
.lcard:hover{border-color:var(--purple-light);transform:translateY(-2px)}
.lcard img{width:100%;height:100%;object-fit:cover;display:block}
.lcard-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(26,15,36,.92));font-size:.55rem;font-family:'Cinzel','Palatino Linotype',serif;color:var(--gold-light);padding:14px 4px 4px;text-align:center;line-height:1.3}
.lcard-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:6px;gap:4px}
.le-icon{font-size:1rem;opacity:.25}
.le-name{font-family:'Cinzel','Palatino Linotype',serif;font-size:.54rem;color:var(--text-dim);text-align:center;line-height:1.3;opacity:.5}
/* Flashcards */
.study-select{display:flex;flex-direction:column;align-items:center;padding:32px 16px;gap:20px}
.study-select h2{font-family:'Cinzel','Palatino Linotype',serif;font-size:1rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase}
.mode-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:480px}
.mode-card{background:rgba(36,21,53,.7);border:1px solid rgba(107,63,160,.3);border-radius:8px;padding:20px 22px;cursor:pointer;transition:all .2s;text-align:left}
.mode-card:hover{border-color:var(--gold);background:rgba(107,63,160,.15)}
.mode-card h3{font-family:'Cinzel','Palatino Linotype',serif;font-size:.85rem;color:var(--gold-light);letter-spacing:.1em;margin-bottom:6px}
.mode-card p{font-size:.85rem;color:var(--text-dim);font-style:italic;line-height:1.5}
.mode-icon{font-size:1.4rem;margin-bottom:10px}
.fc-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:20px}
.fc-meta{font-family:'Cinzel','Palatino Linotype',serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-light);text-align:center}
.fc-score{font-family:'Cinzel','Palatino Linotype',serif;font-size:.72rem;color:var(--text-dim);letter-spacing:.1em;text-align:center}
.fc-score span{color:var(--gold)}
.fc-card-wrap{width:100%;max-width:280px;perspective:1000px}
.fc-card{width:100%;aspect-ratio:2/3;position:relative;transform-style:preserve-3d;transition:transform .55s ease;cursor:pointer;border-radius:10px}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;border-radius:10px;backface-visibility:hidden;overflow:hidden;border:1px solid rgba(107,63,160,.3)}
.fc-front{background:var(--bg2)}
.fc-back{transform:rotateY(180deg);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;gap:12px}
.fc-front img{width:100%;height:100%;object-fit:cover;display:block;border-radius:10px}
.fc-front.inverted img{transform:rotate(180deg)}
.fc-orientation{position:absolute;top:8px;left:0;right:0;text-align:center;font-family:'Cinzel','Palatino Linotype',serif;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--purple-light);background:rgba(26,15,36,.75);padding:4px 0;pointer-events:none}
.fc-tap-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:'Cinzel','Palatino Linotype',serif;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(196,168,224,.5)}
.fc-back-name{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:1rem;color:var(--gold-light);line-height:1.3}
.fc-back-orient{font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-light)}
.fc-back-meaning{font-size:.88rem;color:var(--text-dim);font-style:italic;line-height:1.6}
.fc-loading{display:flex;align-items:center;gap:8px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.65rem;color:var(--text-dim);letter-spacing:.1em}
.fc-choices{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px}
.fc-choice{background:rgba(36,21,53,.6);border:1px solid rgba(107,63,160,.25);border-radius:6px;padding:12px 16px;cursor:pointer;transition:all .2s;font-size:.9rem;color:var(--text-main);text-align:left;font-family:'EB Garamond',Georgia,serif;width:100%}
.fc-choice:hover{border-color:var(--purple-light);background:rgba(107,63,160,.15)}
.fc-choice.correct{border-color:#7abf7a;background:rgba(122,191,122,.1);color:#7abf7a;pointer-events:none}
.fc-choice.wrong{border-color:#c97070;background:rgba(201,112,112,.1);color:#c97070;pointer-events:none}
.fc-choice.reveal{border-color:#7abf7a;background:rgba(122,191,122,.08);color:#7abf7a;pointer-events:none}
.fc-result{text-align:center;font-family:'Cinzel','Palatino Linotype',serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 0}
.fc-result.good{color:#7abf7a}
.fc-result.bad{color:#c97070}
.fc-actions{display:flex;gap:10px;width:100%;max-width:420px;justify-content:center}
/* Card of the day */
.cotd-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;padding:16px 0;max-width:560px;margin:0 auto}
.cotd-date{font-family:'Cinzel','Palatino Linotype',serif;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--purple-light);text-align:center}
.cotd-card-row{display:flex;gap:20px;align-items:flex-start;width:100%}
.cotd-thumb{width:130px;flex-shrink:0;aspect-ratio:2/3;border-radius:8px;overflow:hidden;border:1px solid rgba(201,168,76,.3)}
.cotd-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.cotd-header{flex:1;padding-top:4px}
.cotd-name{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:clamp(1rem,3vw,1.4rem);color:var(--gold-light);line-height:1.3;margin-bottom:10px}
.cotd-meta{display:flex;flex-wrap:wrap;gap:6px}
.cotd-badge{padding:3px 10px;border-radius:20px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(107,63,160,.4);color:var(--purple-light);background:rgba(107,63,160,.1)}
.cotd-sections{width:100%;display:flex;flex-direction:column;gap:14px}
.cotd-section{background:rgba(36,21,53,.6);border:1px solid rgba(107,63,160,.25);border-radius:8px;padding:16px 18px}
.cotd-section-label{font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.cotd-section-text{font-size:.95rem;color:var(--text-dim);font-style:italic;line-height:1.7}
.cotd-reflection{background:rgba(122,31,61,.15);border:1px solid rgba(122,31,61,.3);border-radius:8px;padding:16px 18px;width:100%}
.cotd-reflection-label{font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px}
.cotd-reflection-text{font-size:1rem;color:var(--text-main);font-style:italic;line-height:1.7}
.cotd-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 0}
.cotd-loading p{font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-light)}
/* Card details */
.card-detail-wrap{display:flex;flex-direction:column;gap:16px;max-width:560px;margin:0 auto;padding:16px 0}
.card-detail-row{display:flex;gap:18px;align-items:flex-start}
.card-detail-thumb{width:110px;flex-shrink:0;aspect-ratio:2/3;border-radius:6px;overflow:hidden;border:1px solid rgba(201,168,76,.25)}
.card-detail-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.card-detail-name{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:1.1rem;color:var(--gold-light);margin-bottom:8px}
.card-detail-badges{display:flex;flex-wrap:wrap;gap:5px}
.card-detail-badge{padding:3px 10px;border-radius:20px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(107,63,160,.4);color:var(--purple-light);background:rgba(107,63,160,.1)}
/* Card picker list */
.pick-card-list{display:flex;flex-direction:column;gap:6px;max-height:420px;overflow-y:auto}
.pick-card-row{display:flex;align-items:center;gap:12px;background:rgba(36,21,53,.5);border:1px solid rgba(107,63,160,.2);border-radius:6px;padding:8px 12px;cursor:pointer;transition:all .2s}
.pick-card-row:hover{border-color:var(--gold);background:rgba(107,63,160,.15)}
.pick-card-thumb{width:38px;flex-shrink:0;aspect-ratio:2/3;border-radius:3px;overflow:hidden;border:1px solid rgba(107,63,160,.3)}
.pick-card-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.pick-card-row-name{font-family:'Cinzel','Palatino Linotype',serif;font-size:.82rem;color:var(--text-main);letter-spacing:.04em}
.pick-card-row-suit{font-size:.72rem;color:var(--purple-light);font-style:italic;margin-top:2px}
/* Spread */
.spread-wrap{display:flex;flex-direction:column;gap:20px;padding:16px 0}
.spread-img-preview{width:100%;max-height:280px;object-fit:contain;border-radius:8px;border:1px solid rgba(107,63,160,.3);display:block}
.spread-textarea,.interp-textarea{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(107,63,160,.35);border-radius:6px;padding:12px 14px;color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:1rem;line-height:1.6;resize:vertical;min-height:120px;outline:none;transition:border-color .2s}
.spread-textarea:focus,.interp-textarea:focus{border-color:var(--purple-light)}
.spread-textarea::placeholder,.interp-textarea::placeholder{color:var(--text-dim);font-style:italic}
.context-input,.csearch{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(107,63,160,.35);border-radius:6px;padding:10px 14px;color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:12px}
.context-input:focus,.csearch:focus{border-color:var(--purple-light)}
.context-input::placeholder,.csearch::placeholder{color:var(--text-dim);font-style:italic}
.feedback-box{background:rgba(36,21,53,.7);border:1px solid rgba(107,63,160,.3);border-radius:8px;padding:20px;line-height:1.7;font-size:.95rem}
.feedback-box h4{font-family:'Cinzel','Palatino Linotype',serif;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.feedback-section{margin-bottom:16px}
.feedback-section:last-child{margin-bottom:0}
.fb-label{font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--purple-light);margin-bottom:6px}
.fb-text{color:var(--text-dim);font-style:italic;line-height:1.7}
/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--bg2);border:1px solid rgba(107,63,160,.45);border-radius:8px;padding:24px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Cinzel','Palatino Linotype',serif;font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.clist{max-height:220px;overflow-y:auto;border:1px solid rgba(107,63,160,.25);border-radius:4px;margin-bottom:14px}
.citem{padding:8px 12px;cursor:pointer;font-size:.88rem;border-bottom:1px solid rgba(107,63,160,.1);transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.citem:hover{background:rgba(107,63,160,.15)}
.citem.taken{opacity:.4;pointer-events:none}
.csuit{font-size:.68rem;color:var(--purple-light);font-style:italic}
/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(36,21,53,.97);border:1px solid var(--purple-light);border-radius:4px;padding:9px 18px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.1em;color:var(--gold-light);z-index:200;animation:fup .3s ease;white-space:nowrap}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:3px}
</style>
</head>

<div id="root"><div style="color:#9b6fd4;font-family:serif;text-align:center;padding:40px">Loading…</div></div>

<!-- React from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<!-- Firebase via module, boots the app when ready -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = {
  db: getFirestore(initializeApp({
    apiKey:"AIzaSyDU43lAmE8mGLb4BpRVMCF0_IngytjpdSM",
    authDomain:"tarotstudy.firebaseapp.com",
    projectId:"tarotstudy",
    storageBucket:"tarotstudy.firebasestorage.app",
    messagingSenderId:"897620280064",
    appId:"1:897620280064:web:7e3945ded122d0093829e5"
  })),
  doc, setDoc, deleteDoc, collection, getDocs
};

async function loadAllCards(){
  const snap = await FB.getDocs(FB.collection(FB.db,'cards'));
  const cards = {};
  snap.forEach(d => { cards[d.id.replace(/__dot__/g,'.')] = d.data(); });
  return cards;
}

const SUITS=["Wands","Cups","Swords","Pentacles"];
const RANKS=["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"];
const ALL_CARDS=[...MAJOR.map(n=>({name:n,suit:"Major Arcana",type:"major"})),...SUITS.flatMap(s=>RANKS.map(r=>({name:`${r} of ${s}`,suit:s,type:"minor"})))];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function compressImage(file,maxDim=600){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(maxDim/img.width,maxDim/img.height,1);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',0.78));
    };img.src=url;
  });
}

async function claude(messages,apiKey,maxTokens=600){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens,messages})
  });
  if(!r.ok)throw new Error(r.status);
  return((await r.json()).content?.[0]?.text||'').trim();
}

async function identifyCard(b64src,apiKey){
  const b64=b64src.split(',')[1];
  const t=await claude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:'This is a tarot card. Reply with ONLY the card name. E.g. "The Fool", "Ace of Wands". If unclear: UNKNOWN'}]}],apiKey,60);
  if(!t||t==='UNKNOWN')return null;
  const n=t.toLowerCase().replace(/[^a-z0-9 ]/g,'');
  return ALL_CARDS.find(c=>c.name.toLowerCase().replace(/[^a-z0-9 ]/g,'')=== n)||null;
}

async function getMeanings(name,rev,apiKey){

async function getAllChoices(name,rev,allNames,apiKey){
  const pool=shuffle(allNames.filter(n=>n!==name)).slice(0,6).join(', ');
  const t=await claude([{role:'user',content:`Tarot flashcard for ${name} (${rev?'reversed':'upright'}). Write 4 answer options — 1 correct, 3 wrong. Each must be 4-6 words. Same length and style. Return ONLY 4 options separated by | with CORRECT: prefix on the right one. Wrong answers use energy from: ${pool}`}],apiKey,200);
  const parts=t.split('|').map(s=>s.trim()).filter(Boolean);
  let correct='',wrongs=[];
  parts.forEach(p=>{if(p.startsWith('CORRECT:')){correct=p.replace('CORRECT:','').trim();}else{wrongs.push(p);}});
  if(!correct){correct=parts[0]||'';wrongs=parts.slice(1);}
  return{correct,choices:shuffle([{text:correct,isCorrect:true},...wrongs.slice(0,3).map(t=>({text:t,isCorrect:false}))])};
}

async function getCardDetails(name,apiKey){

}

async function getSpreadFeedback(imgSrc,context,interp,apiKey){

      e('button',{className:'btn btn-g',style:{alignSelf:'flex-start'},onClick:()=>{setImg(null);setFb(null);}},'Change photo'),
      !fb&&React.createElement(React.Fragment,null,
        e('div',null,e('div',{className:'sec-title',style:{marginBottom:8}},'Context (optional)'),e('input',{className:'context-input',placeholder:'What is this reading for?',value:ctx,onChange:ev=>setCtx(ev.target.value)})),
        e('div',null,e('div',{className:'sec-title',style:{marginBottom:8}},'Your interpretation'),e('textarea',{className:'spread-textarea',placeholder:'Share your reading…',value:interp,onChange:ev=>setInterp(ev.target.value)})),
        e('button',{className:'btn btn-p',onClick:submit,disabled:!interp.trim()||loading},loading?'Reading the spread…':'Get Reading Feedback')
      ),
      fb&&React.createElement(React.Fragment,null,
        e('div',{className:'feedback-box'},
          e('h4',null,'Spread Reading'),
          e('div',{className:'feedback-section'},e('div',{className:'fb-label'},'Cards identified'),e('div',{className:'fb-text'},fb.cards)),
          e('div',{className:'feedback-section'},e('div',{className:'fb-label'},'Full reading'),e('div',{className:'fb-text'},fb.reading)),
          e('div',{className:'feedback-section'},e('div',{className:'fb-label'},'Feedback on your read'),e('div',{className:'fb-text'},fb.feedback)),
          e('div',{className:'feedback-section'},e('div',{className:'fb-label'},'To explore further'),e('div',{className:'fb-text'},fb.deepen))
        ),
        e('div',{style:{display:'flex',gap:10}},
          e('button',{className:'btn btn-g',onClick:()=>setFb(null)},'Try again'),
          e('button',{className:'btn btn-g',onClick:()=>{setImg(null);setFb(null);setCtx('');setInterp('');}},'New spread')
        )
      )
    )
  );
}

function App(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(API_KEY)||null);
  const [savedCards,setSavedCards]=useState({});
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState(false);
  const [tab,setTab]=useState('today');
  const [showSettings,setShowSettings]=useState(false);
  const [toast,setToast]=useState(null);
  const toastRef=useRef(null);

  useEffect(()=>{
    loadAllCards()
      .then(cards=>{setSavedCards(cards);setLoading(false);})
      .catch(err=>{console.error('Load failed:',err);setLoadErr(true);setLoading(false);});
  },[]);

  const showToast=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),3000);};

  if(!apiKey)return e(Onboarding,{onSave:k=>setApiKey(k)});

  if(loading)return e('div',{className:'app'},
    e('div',{className:'header'},e('div',{className:'htitle'},'The Arcane Codex'),e('div',{className:'hsub'},'Tarot Study Companion')),
    e('div',{className:'loading'},e('div',{className:'spinner',style:{width:28,height:28,borderWidth:3}}),e('p',null,'Loading your deck…'))
  );

  if(loadErr)return e('div',{className:'app'},
    e('div',{className:'header'},e('div',{className:'htitle'},'The Arcane Codex')),
    e('div',{className:'sph'},
      e('div',{className:'sph-icon'},'✕'),
      e('h3',null,'Could not load your deck'),
      e('p',null,'Check your internet connection and Firestore rules, then reload.'),
      e('button',{className:'btn btn-p',style:{marginTop:20},onClick:()=>window.location.reload()},'Reload')
    )
  );

  const count=Object.keys(savedCards).length;
  return e('div',{className:'app'},
    e('div',{className:'header'},
      e('div',{className:'htitle'},'The Arcane Codex'),
      e('div',{className:'hsub'},'Tarot Study Companion'),
      e('button',{className:'hset',onClick:()=>setShowSettings(s=>!s)},'⚙')
    ),
    showSettings&&e(SettingsPanel,{apiKey,onUpdate:k=>{setApiKey(k);showToast('API key updated');},onClose:()=>setShowSettings(false)}),
    e('div',{className:'prog-wrap'},
      e('div',{className:'prog-lbl'},e('span',{className:'pt'},'Deck Completion'),e('span',{className:'pc'},count+' / 78')),
      e('div',{className:'prog-track'},e('div',{className:'prog-fill',style:{width:(count/78*100)+'%'}}))
    ),
    e('div',{className:'nav'},
      [['today','Today'],['library','Library'],['study','Flashcards'],['details','Cards'],['spread','Spread']].map(([t,l])=>
        e('button',{key:t,className:'nbtn'+(tab===t?' active':''),onClick:()=>setTab(t)},l))
    ),
    tab==='today'&&e(CardOfTheDayTab,{savedCards,apiKey}),
    tab==='library'&&e(LibraryTab,{savedCards,showToast,onDelete:n=>setSavedCards(p=>{const c={...p};delete c[n];return c;})}),
    tab==='study'&&e(StudyTab,{savedCards,apiKey}),
    tab==='details'&&e(CardDetailsTab,{savedCards,apiKey}),
    tab==='spread'&&e(SpreadTab,{apiKey}),
    e(Toast,{msg:toast})
  );
}

const e=React.createElement;
ReactDOM.render(e(App,null),document.getElementById('root'));
} // end bootApp
</script>
</body>
</html>
