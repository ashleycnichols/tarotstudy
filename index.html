const CARD_PREFIX='tarot-card:';
const MAJOR=["The Fool","The Magician","The High Priestess","The Empress","The Emperor","The Hierophant","The Lovers","The Chariot","Strength","The Hermit","Wheel of Fortune","Justice","The Hanged Man","Death","Temperance","The Devil","The Tower","The Star","The Moon","The Sun","Judgement","The World"];
const SUITS=["Wands","Cups","Swords","Pentacles"];
const RANKS=["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"];
const ALL_CARDS=[...MAJOR.map(n=>({name:n,suit:"Major Arcana",type:"major"})),...SUITS.flatMap(s=>RANKS.map(r=>({name:`${r} of ${s}`,suit:s,type:"minor"})))];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── localStorage storage (works in any browser, any device) ──
function loadAllCards(){
  try{
    const keys=Object.keys(localStorage).filter(k=>k.startsWith(CARD_PREFIX));
    const cards={};
    keys.forEach(k=>{
      try{const v=localStorage.getItem(k);if(v){cards[decodeURIComponent(k.slice(CARD_PREFIX.length))]=JSON.parse(v);}}catch{}
    });
    return cards;
  }catch{return{};}
}
function saveCard(name,data){
  try{localStorage.setItem(CARD_PREFIX+encodeURIComponent(name),JSON.stringify(data));}catch(e){
    if(e.name==='QuotaExceededError'){alert('Storage full. Try removing some cards or clearing old data.');}
  }
}
function deleteCard(name){try{localStorage.removeItem(CARD_PREFIX+encodeURIComponent(name));}catch{}}

function compressImage(file,maxDim=700){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(maxDim/img.width,maxDim/img.height,1);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',0.78));
    };img.src=url;
  });
}

async function callClaude(messages,apiKey,maxTokens=600){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens,messages})
  });
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  return(d.content?.[0]?.text||'').trim();
}

async function identifyCard(base64,apiKey){
  const b64=base64.split(',')[1];
  const text=await callClaude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:'This is a tarot card. Respond with ONLY the card name. Standard names like "The Fool", "The High Priestess", "Ace of Wands". If unrecognisable: UNKNOWN'}]}],apiKey,60);
  if(!text||text==='UNKNOWN')return null;
  const n=text.toLowerCase().replace(/[^a-z0-9 ]/g,'');
  return ALL_CARDS.find(c=>c.name.toLowerCase().replace(/[^a-z0-9 ]/g,'')=== n)||null;
}
async function getMeanings(cardName,isReversed,apiKey){
  return callClaude([{role:'user',content:`Give 3 brief key meanings for ${cardName} ${isReversed?'reversed':'upright'} in tarot. Comma-separated short phrases only, no numbering.`}],apiKey,120);
}
async function getWrongChoices(correctCard,isReversed,allNames,apiKey){
  const pool=shuffle(allNames.filter(n=>n!==correctCard)).slice(0,12).join(', ');
  const text=await callClaude([{role:'user',content:`For a tarot quiz about ${correctCard} (${isReversed?'reversed':'upright'}), give 3 plausible but wrong meaning phrases. Return ONLY 3 short phrases separated by |. Draw from: ${pool}`}],apiKey,150);
  return text.split('|').map(s=>s.trim()).filter(Boolean).slice(0,3);
}
async function getSingleCardFeedback(cardName,isReversed,interpretation,apiKey){
  const prompt=`You are a thoughtful tarot teacher. A student is interpreting ${cardName} ${isReversed?'reversed':'upright'}.\n\nTheir interpretation: "${interpretation}"\n\nRespond in this exact format with sections separated by |||:\nACCURACY: [1-2 sentences on accuracy vs traditional meaning]\nTHEMES: [1-2 sentences on suit/element themes captured or missed]\nMISSED: [1-2 sentences on important nuances they missed]\nENCOURAGEMENT: [1 warm sentence of encouragement]`;
  const text=await callClaude([{role:'user',content:prompt}],apiKey,400);
  const parts=text.split('|||').map(s=>s.trim());
  const extract=(label,s)=>{const m=s.match(new RegExp(`${label}:\\s*(.+)`,'s'));return m?m[1].trim():s;};
  return{accuracy:extract('ACCURACY',parts[0]||''),themes:extract('THEMES',parts[1]||''),missed:extract('MISSED',parts[2]||''),encouragement:extract('ENCOURAGEMENT',parts[3]||'')};
}
async function getSpreadFeedback(spreadImage,context,interpretation,apiKey){
  const b64=spreadImage.split(',')[1];
  const prompt=`You are a wise and warm tarot reader and teacher. The student has photographed a tarot spread.${context?`\n\nContext: "${context}"`:''}

Student's interpretation: "${interpretation}"

Respond with four sections separated by |||:
CARDS: [Identify visible cards and positions]
READING: [Your full reading of the spread]
FEEDBACK: [Specific feedback on their interpretation]
DEEPEN: [2-3 questions or themes to explore further]`;
  const text=await callClaude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:prompt}]}],apiKey,800);
  const parts=text.split('|||').map(s=>s.trim());
  const extract=(label,s)=>{const m=s.match(new RegExp(`${label}:\\s*(.+)`,'s'));return m?m[1].trim():s;};
  return{cards:extract('CARDS',parts[0]||''),reading:extract('READING',parts[1]||''),feedback:extract('FEEDBACK',parts[2]||''),deepen:extract('DEEPEN',parts[3]||'')};
}

          React.createElement('div',{className:'feedback-section'},React.createElement('div',{className:'fb-label'},'To explore further'),React.createElement('div',{className:'fb-text'},feedback.deepen))
        ),
        React.createElement('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
          React.createElement('button',{className:'btn btn-g',onClick:()=>setFeedback(null)},'Try again'),
          React.createElement('button',{className:'btn btn-g',onClick:reset},'New spread')

}

function StudyTab({savedCards,apiKey}){
  const [mode,setMode]=useState(null);const [orientation,setOrientation]=useState(null);
  const [queue,setQueue]=useState([]);const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);const [meaning,setMeaning]=useState('');const [loadingMeaning,setLoadingMeaning]=useState(false);
  const [choices,setChoices]=useState([]);const [loadingChoices,setLoadingChoices]=useState(false);
  const [answered,setAnswered]=useState(null);const [score,setScore]=useState({correct:0,total:0});const [resultMsg,setResultMsg]=useState('');
  const uploadedCards=useMemo(()=>Object.entries(savedCards).map(([name,data])=>({name,...data})),[savedCards]);
  const count=uploadedCards.length;
  function buildQueue(orient){return shuffle(uploadedCards).map(card=>{let rev=false;if(orient==='reversed')rev=true;else if(orient==='mixed')rev=Math.random()<0.5;return{...card,isReversed:rev};});}
  function startSession(orient){setOrientation(orient);const q=buildQueue(orient);setQueue(q);setIdx(0);setFlipped(false);setMeaning('');setChoices([]);setAnswered(null);setScore({correct:0,total:0});setResultMsg('');setMode('fc');loadChoices(q[0]);}
  async function loadChoices(cardObj){
    setLoadingChoices(true);setChoices([]);
    const allNames=uploadedCards.map(c=>c.name);
    try{
      const wrongs=await getWrongChoices(cardObj.name,cardObj.isReversed,allNames,apiKey);
      const correctMeaning=await getMeanings(cardObj.name,cardObj.isReversed,apiKey);
      setChoices(shuffle([{text:correctMeaning,isCorrect:true},...wrongs.map(t=>({text:t,isCorrect:false}))]));
      setMeaning(correctMeaning);
    }catch(e){console.error(e);}
    setLoadingChoices(false);
  }
  async function handleFlip(){setFlipped(true);if(!meaning&&!loadingMeaning){setLoadingMeaning(true);try{const m=await getMeanings(queue[idx].name,queue[idx].isReversed,apiKey);setMeaning(m);}catch{}setLoadingMeaning(false);}}
  function handleAnswer(choice){setAnswered(choice);setScore(s=>({correct:s.correct+(choice.isCorrect?1:0),total:s.total+1}));setResultMsg(choice.isCorrect?'Well read.':'Not quite — flip the card to see the meaning.');if(!flipped&&choice.isCorrect)setFlipped(true);}
  async function nextCard(){const next=idx+1;if(next>=queue.length){const q=buildQueue(orientation);setQueue(q);setIdx(0);setFlipped(false);setMeaning('');setAnswered(null);setResultMsg('');loadChoices(q[0]);}else{setIdx(next);setFlipped(false);setMeaning('');setAnswered(null);setResultMsg('');loadChoices(queue[next]);}}
  if(!count)return React.createElement('div',{className:'sph'},React.createElement('div',{className:'sph-icon'},'☽'),React.createElement('h3',null,'Your deck awaits'),React.createElement('p',null,'Upload cards first to begin studying.'));
  if(!mode)return React.createElement('div',{className:'study-select'},
    React.createElement('h2',null,'Choose your practice'),
    React.createElement('div',{className:'mode-cards'},
      [{orient:'upright',icon:'☀',title:'Upright',desc:'Practice the classic upright meanings of each card.'},{orient:'reversed',icon:'☽',title:'Reversed',desc:'Deepen your knowledge with inverted card meanings.'},{orient:'mixed',icon:'✦',title:'Mixed',desc:'A full reading — upright and reversed cards combined.'}].map(m=>
        React.createElement('div',{key:m.orient,className:'mode-card',onClick:()=>startSession(m.orient)},React.createElement('div',{className:'mode-icon'},m.icon),React.createElement('h3',null,m.title),React.createElement('p',null,m.desc))
      )
    ),
    React.createElement('div',{className:'fc-score'},React.createElement('span',null,count),' cards in your deck')
  );
  const current=queue[idx];if(!current)return null;
  return React.createElement('div',{className:'fc-wrap'},
    React.createElement('div',{className:'fc-meta'},`Card ${(idx%queue.length)+1} of ${queue.length}`),
    React.createElement('div',{className:'fc-score'},'Score: ',React.createElement('span',null,score.correct),' / ',React.createElement('span',null,score.total)),
    React.createElement(FlashCard,{card:current,isReversed:current.isReversed,flipped,onFlip:handleFlip,meaning,loadingMeaning}),
    loadingChoices?React.createElement('div',{className:'fc-loading'},React.createElement('div',{className:'spinner'}),React.createElement('span',null,'Drawing choices…'))
    :choices.length>0&&React.createElement('div',{className:'fc-choices'},
      choices.map((c,i)=>React.createElement('button',{key:i,className:`fc-choice${answered?(c.isCorrect?' correct':c===answered?' wrong':c.isCorrect?' reveal':''):''}`,onClick:()=>!answered&&handleAnswer(c)},c.text))
    ),
    resultMsg&&React.createElement('div',{className:`fc-result ${answered?.isCorrect?'good':'bad'}`},resultMsg),
    answered&&React.createElement('div',{className:'fc-actions'},
      React.createElement('button',{className:'btn btn-p',onClick:nextCard},'Next Card'),
      React.createElement('button',{className:'btn btn-g',onClick:()=>{setMode(null);setOrientation(null);}},'Change Mode')
    )
  );
}

function App(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(API_KEY_KEY)||null);
  const [savedCards,setSavedCards]=useState({});
  const [tab,setTab]=useState('upload');const [showSettings,setShowSettings]=useState(false);
  const [toast,setToast]=useState(null);const toastRef=useRef(null);

  useEffect(()=>{setSavedCards(loadAllCards());},[]);

  const showToast=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),3000);};
  if(!apiKey)return React.createElement(Onboarding,{onSave:k=>setApiKey(k)});
  const count=Object.keys(savedCards).length;
  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'header'},
      React.createElement('div',{className:'htitle'},'The Arcane Codex'),
      React.createElement('div',{className:'hsub'},'Tarot Study Companion'),
      React.createElement('button',{className:'hset',onClick:()=>setShowSettings(s=>!s)},'⚙')
    ),
    showSettings&&React.createElement(SettingsPanel,{apiKey,onUpdate:k=>{setApiKey(k);showToast('API key updated');},onClose:()=>setShowSettings(false)}),
    React.createElement('div',{className:'prog-wrap'},
      React.createElement('div',{className:'prog-lbl'},React.createElement('span',{className:'pt'},'Deck Completion'),React.createElement('span',{className:'pc'},`${count} / 78`)),
      React.createElement('div',{className:'prog-track'},React.createElement('div',{className:'prog-fill',style:{width:`${(count/78)*100}%`}}))
    ),
    React.createElement('div',{className:'nav'},
      [['upload','Upload'],['library','Library'],['study','Flashcards'],['interpret','Interpret'],['spread','Spread']].map(([t,l])=>
        React.createElement('button',{key:t,className:`nbtn${tab===t?' active':''}`,onClick:()=>setTab(t)},l))
    ),
    tab==='upload'&&React.createElement(UploadTab,{savedCards,apiKey,showToast,onCardSaved:(name,data)=>setSavedCards(prev=>({...prev,[name]:data}))}),
    tab==='library'&&React.createElement(LibraryTab,{savedCards,showToast,onDelete:name=>setSavedCards(prev=>{const n={...prev};delete n[name];return n;})}),
    tab==='study'&&React.createElement(StudyTab,{savedCards,apiKey}),
    tab==='interpret'&&React.createElement(InterpretTab,{savedCards,apiKey}),
    tab==='spread'&&React.createElement(SpreadTab,{apiKey}),
    toast&&React.createElement(Toast,{msg:toast})
  );
}
ReactDOM.render(React.createElement(App),document.getElementById('root'));
}); // end DOMContentLoaded
</script>
