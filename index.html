<style>
*{box-sizing:border-box;margin:0;padding:0}

.fc-result{text-align:center;font-family:'Cinzel','Palatino Linotype',serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 0}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function stripMd(s){return(s||'').replace(/\*\*/g,'').replace(/\*/g,'').replace(/^#+\s*/gm,'').trim();}

function compressImage(file,maxDim){
  maxDim=maxDim||600;
  return new Promise(function(res){
    var img=new Image(),url=URL.createObjectURL(file);
    img.onload=function(){
      var scale=Math.min(maxDim/img.width,maxDim/img.height,1);
      var c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',0.78));
    };img.src=url;
  });
}

function callClaude(messages,apiKey,maxTokens){
  maxTokens=maxTokens||600;

    method:'POST',

}

function identifyCard(b64src,apiKey){
  var b64=b64src.split(',')[1];
  return callClaude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:'This is a tarot card. Reply with ONLY the card name. E.g. "The Fool", "Ace of Wands". If unclear: UNKNOWN'}]}],apiKey,60).then(function(t){
    if(!t||t==='UNKNOWN')return null;
    var n=t.toLowerCase().replace(/[^a-z0-9 ]/g,'');
    return ALL_CARDS.find(function(c){return c.name.toLowerCase().replace(/[^a-z0-9 ]/g,'')=== n;})||null;
  });
}

function getMeanings(name,rev,apiKey){
  return callClaude([{role:'user',content:'3 brief key meanings for '+name+' '+(rev?'reversed':'upright')+' in tarot. Comma-separated phrases only.'}],apiKey,120);
}

function getAllChoices(name,rev,allNames,apiKey,cachedMeanings){
  // If we have a cached correct meaning, use it directly — no ambiguity
  var cachedCard=cachedMeanings&&cachedMeanings[name];
  var correctText=cachedCard?(rev?cachedCard.reversed:cachedCard.upright):'';
  // Trim to first sentence if long
  if(correctText&&correctText.length>80){
    var firstStop=correctText.search(/[.!?]/);
    if(firstStop>20)correctText=correctText.slice(0,firstStop+1);
  }

  var pool=shuffle(allNames.filter(function(n){return n!==name;})).slice(0,6).join(', ');

  // If we have a correct answer, just ask for 3 wrong ones
  if(correctText){
    return callClaude([{role:'user',content:'Tarot quiz. The correct answer for '+name+' ('+(rev?'reversed':'upright')+') is: "'+correctText+'"\n\nWrite 3 WRONG answer options that are plausible but clearly different. Draw from these cards: '+pool+'\nReturn ONLY 3 options separated by |, nothing else. Match the length and style of the correct answer.'}],apiKey,150).then(function(t){
      var wrongs=t.split('|').map(function(s){return s.trim();}).filter(Boolean).slice(0,3);
      return{correct:correctText,choices:shuffle([{text:correctText,isCorrect:true}].concat(wrongs.map(function(w){return{text:w,isCorrect:false};})))};
    });
  }

  // No cache — generate all 4 together with clearer format
  return callClaude([{role:'user',content:'Tarot flashcard for '+name+' ('+(rev?'reversed':'upright')+').\nLine 1: CORRECT answer (4-8 words, key meaning)\nLines 2-4: WRONG answers (same length/style, plausible but wrong, from: '+pool+')\nReturn ONLY 4 lines, one per answer, no labels, no numbering.'}],apiKey,150).then(function(t){
    var lines=t.split('\n').map(function(s){return s.trim();}).filter(Boolean).slice(0,4);
    var correct=lines[0]||name;
    var wrongs=lines.slice(1);
    return{correct:correct,choices:shuffle([{text:correct,isCorrect:true}].concat(wrongs.map(function(w){return{text:w,isCorrect:false};})))};
  });
}

function parseCardDetails(t){
  var p=t.split('|||').map(function(s){return s.trim();});
  var ex=function(lbl,s){var m=s.match(new RegExp(lbl+':\\s*(.+)','s'));return m?stripMd(m[1]):stripMd(s);};
  var a=ex('ASSOCIATIONS',p[2]||'');

}

function getCardDetails(name,apiKey){

function getDailyContext(){
  var now=new Date();
  var month=now.getMonth()+1,day=now.getDate(),dow=now.getDay();
  var known=new Date(2000,0,6,18,14,0);
  var diff=(now-known)/(1000*60*60*24),cycle=29.53058867;
  var phase=((diff%cycle)+cycle)%cycle;
  var moonPhase=phase<1.85?'New Moon':phase<7.38?'Waxing Crescent':phase<9.22?'First Quarter':phase<14.77?'Waxing Gibbous':phase<16.61?'Full Moon':phase<22.15?'Waning Gibbous':phase<23.99?'Last Quarter':'Waning Crescent';
  var planets=['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn'];
  var dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var getSeason=function(){if((month===12&&day>=21)||(month<=2)||(month===3&&day<20))return'Winter';if((month===3&&day>=20)||(month<=5)||(month===6&&day<21))return'Spring';if((month===6&&day>=21)||(month<=8)||(month===9&&day<22))return'Summer';return'Autumn';};
  var getCeltic=function(){var pts=[{name:'Samhain',m:11,d:1},{name:'Winter Solstice',m:12,d:21},{name:'Imbolc',m:2,d:1},{name:'Spring Equinox',m:3,d:20},{name:'Bealtaine',m:5,d:1},{name:'Summer Solstice',m:6,d:21},{name:'Lughnasadh',m:8,d:1},{name:'Autumn Equinox',m:9,d:22}];for(var i=0;i<pts.length;i++){var p=pts[i];var pd=new Date(now.getFullYear(),p.m-1,p.d);if(Math.abs((now-pd)/(1000*60*60*24))<=3)return p.name;}return null;};
  return{dayName:dayNames[dow],dayRuler:planets[dow],moonPhase:moonPhase,season:getSeason(),celticPoint:getCeltic()};
}

function getDailyGuidance(cardName,cached,apiKey){
