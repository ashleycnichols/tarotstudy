<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1a0f24" />
<title>The Arcane Codex</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold-light:#e8c96a;--maroon:#7a1f3d;--purple:#6b3fa0;--purple-light:#9b6fd4;--text-main:#f0e6ff;--text-dim:#c4a8e0;--bg:#1a0f24;--bg2:#241535;}
body{background:var(--bg);background-image:radial-gradient(ellipse at 15% 15%,rgba(107,63,160,.18) 0%,transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(122,31,61,.15) 0%,transparent 50%);color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:16px;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:0 16px 80px}
.header{text-align:center;padding:32px 0 24px;position:relative}
.header::after{content:'';display:block;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin-top:20px}
.htitle{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:clamp(1.3rem,4vw,2rem);color:var(--gold-light);letter-spacing:.04em;text-shadow:0 0 40px rgba(201,168,76,.4),0 0 80px rgba(107,63,160,.3);line-height:1.3}
.hsub{font-family:'Cinzel','Palatino Linotype',serif;font-size:.72rem;color:var(--purple-light);letter-spacing:.25em;text-transform:uppercase;margin-top:8px}
.hset{position:absolute;top:32px;right:0;background:none;border:1px solid rgba(107,63,160,.3);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--text-dim);font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.hset:hover{border-color:var(--purple-light);color:var(--gold-light)}
.nav{display:flex;gap:4px;margin:24px 0;border:1px solid rgba(107,63,160,.3);border-radius:4px;padding:4px;background:rgba(26,15,36,.6)}
.nbtn{flex:1;padding:9px 6px;background:none;border:none;color:var(--text-dim);font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s}
.nbtn:hover{color:var(--gold-light);background:rgba(107,63,160,.12)}
.nbtn.active{background:rgba(107,63,160,.2);color:var(--gold-light);border:1px solid rgba(201,168,76,.35)}
.prog-wrap{margin-bottom:24px}
.prog-lbl{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-lbl .pt{font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim)}
.prog-lbl .pc{font-size:.9rem;color:var(--gold)}
.prog-track{height:3px;background:rgba(107,63,160,.2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(to right,var(--purple),var(--gold-light));border-radius:2px;transition:width .6s ease}
.sec-title{font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--purple-light);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(107,63,160,.25)}
.btn{padding:9px 18px;border-radius:4px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1px solid}
.btn-p{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold-light)}
.btn-p:hover{background:rgba(201,168,76,.22)}
.btn-p:disabled{opacity:.4;cursor:default}
.btn-g{background:none;border-color:rgba(107,63,160,.35);color:var(--text-dim)}
.btn-g:hover{border-color:var(--purple-light);color:var(--text-main)}
.upload-zone{border:1px dashed rgba(107,63,160,.5);border-radius:6px;padding:32px 20px;text-align:center;background:rgba(107,63,160,.06);transition:all .2s;margin-bottom:24px}
.upload-zone.drag,.upload-zone:hover{border-color:var(--purple-light);background:rgba(107,63,160,.12)}
.uicon{font-size:1.8rem;margin-bottom:10px}
.umain{font-family:'Cinzel','Palatino Linotype',serif;font-size:.82rem;color:var(--gold);letter-spacing:.08em;margin-bottom:6px}
.usub{font-size:.8rem;color:var(--text-dim);font-style:italic;margin-bottom:14px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px;margin-bottom:24px}
.pcard{position:relative;aspect-ratio:2/3;border-radius:4px;overflow:hidden;border:1px solid rgba(201,168,76,.2);cursor:pointer;transition:border-color .2s}
.pcard:hover{border-color:var(--gold)}.pcard.assigned{border-color:var(--maroon)}.pcard.scanning{border-color:rgba(155,111,212,.5);pointer-events:none}.pcard.err{border-color:#c97070}
.pcard img{width:100%;height:100%;object-fit:cover;display:block}
.pcard-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(26,15,36,.9);font-size:.58rem;font-family:'Cinzel','Palatino Linotype',serif;color:var(--gold-light);padding:4px 5px;text-align:center;line-height:1.3}
.pcard-rm{position:absolute;top:4px;right:4px;width:18px;height:18px;background:rgba(139,26,26,.85);border:none;border-radius:50%;color:#fff;font-size:.6rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.pcard:hover .pcard-rm{display:flex}
.scan-ov{position:absolute;inset:0;background:rgba(26,15,36,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.spinner{width:18px;height:18px;border:2px solid rgba(155,111,212,.3);border-top-color:var(--purple-light);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.slbl{font-family:'Cinzel','Palatino Linotype',serif;font-size:.52rem;color:var(--purple-light);letter-spacing:.1em}
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--bg2);border:1px solid rgba(107,63,160,.45);border-radius:8px;padding:24px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Cinzel','Palatino Linotype',serif;font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.modal-img{width:100%;max-height:180px;object-fit:contain;border-radius:4px;margin-bottom:16px;border:1px solid rgba(201,168,76,.15)}
.csearch{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(107,63,160,.4);border-radius:4px;padding:9px 12px;color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:1rem;margin-bottom:10px;outline:none;transition:border-color .2s}
.csearch:focus{border-color:var(--purple-light)}.csearch::placeholder{color:var(--text-dim)}
.clist{max-height:200px;overflow-y:auto;border:1px solid rgba(107,63,160,.25);border-radius:4px;margin-bottom:14px}
.citem{padding:8px 12px;cursor:pointer;font-size:.88rem;border-bottom:1px solid rgba(107,63,160,.1);transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.citem:hover{background:rgba(107,63,160,.15)}.citem.taken{opacity:.4;pointer-events:none}
.csuit{font-size:.68rem;color:var(--purple-light);font-style:italic}
.lib-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.fchip{padding:4px 12px;border-radius:20px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(107,63,160,.3);color:var(--text-dim);background:none;transition:all .2s}
.fchip:hover{border-color:var(--purple-light);color:var(--text-main)}.fchip.active{background:rgba(107,63,160,.2);border-color:var(--purple-light);color:var(--gold-light)}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:8px}
.lcard{position:relative;aspect-ratio:2/3;border-radius:5px;overflow:hidden;border:1px solid rgba(107,63,160,.2);cursor:pointer;transition:all .2s;background:rgba(107,63,160,.05)}
.lcard:hover{border-color:var(--purple-light);transform:translateY(-2px)}
.lcard img{width:100%;height:100%;object-fit:cover;display:block}
.lcard-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(26,15,36,.92));font-size:.55rem;font-family:'Cinzel','Palatino Linotype',serif;color:var(--gold-light);padding:14px 4px 4px;text-align:center;line-height:1.3}
.lcard-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:6px;gap:4px}
.le-icon{font-size:1rem;opacity:.25}.le-name{font-family:'Cinzel','Palatino Linotype',serif;font-size:.54rem;color:var(--text-dim);text-align:center;line-height:1.3;opacity:.5}
.set-panel{background:rgba(36,21,53,.95);border:1px solid rgba(107,63,160,.4);border-radius:8px;padding:20px;margin-bottom:24px}
.set-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.set-inp{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(107,63,160,.4);border-radius:4px;padding:9px 12px;color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:.95rem;outline:none;transition:border-color .2s}
.kstatus{font-size:.74rem;font-style:italic;color:#7abf7a;margin-top:8px}
.onboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.osigil{font-size:3rem;margin-bottom:24px}.otitle{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:clamp(1.2rem,4vw,1.8rem);color:var(--gold-light);letter-spacing:.04em;text-shadow:0 0 40px rgba(201,168,76,.4);margin-bottom:10px;line-height:1.3}
.osub{font-family:'Cinzel','Palatino Linotype',serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--purple-light);margin-bottom:32px}
.ocard{width:100%;max-width:400px;background:rgba(36,21,53,.8);border:1px solid rgba(107,63,160,.35);border-radius:10px;padding:28px 24px;text-align:left}
.olabel{font-family:'Cinzel','Palatino Linotype',serif;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-light);margin-bottom:8px;display:block}
.odesc{font-size:.86rem;color:var(--text-dim);font-style:italic;line-height:1.6;margin-bottom:16px}
.oinput{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(107,63,160,.4);border-radius:4px;padding:11px 13px;color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:1rem;margin-bottom:14px;outline:none;transition:border-color .2s;letter-spacing:.04em}
.oinput:focus{border-color:var(--purple-light)}.oinput::placeholder{color:rgba(196,168,224,.3);letter-spacing:0}
.oerr{color:#c97070;font-size:.8rem;margin-bottom:10px;font-style:italic}
.ohint{font-size:.76rem;color:var(--text-dim);margin-top:12px;line-height:1.5;opacity:.7}.ohint a{color:var(--purple-light)}
.loading{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading .spinner{width:28px;height:28px;border-width:3px}
.loading p{font-family:'Cinzel','Palatino Linotype',serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--purple-light)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(36,21,53,.97);border:1px solid var(--purple-light);border-radius:4px;padding:9px 18px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.68rem;letter-spacing:.1em;color:var(--gold-light);z-index:200;animation:fup .3s ease;white-space:nowrap}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.study-select{display:flex;flex-direction:column;align-items:center;padding:32px 16px;gap:20px}
.study-select h2{font-family:'Cinzel','Palatino Linotype',serif;font-size:1rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase}
.mode-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:480px}
.mode-card{background:rgba(36,21,53,.7);border:1px solid rgba(107,63,160,.3);border-radius:8px;padding:20px 22px;cursor:pointer;transition:all .2s;text-align:left}
.mode-card:hover{border-color:var(--gold);background:rgba(107,63,160,.15)}
.mode-card h3{font-family:'Cinzel','Palatino Linotype',serif;font-size:.85rem;color:var(--gold-light);letter-spacing:.1em;margin-bottom:6px}
.mode-card p{font-size:.85rem;color:var(--text-dim);font-style:italic;line-height:1.5}
.mode-icon{font-size:1.4rem;margin-bottom:10px}
.fc-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:20px}
.fc-meta{font-family:'Cinzel','Palatino Linotype',serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-light);text-align:center}
.fc-card-wrap{width:100%;max-width:280px;perspective:1000px}
.fc-card{width:100%;aspect-ratio:2/3;position:relative;transform-style:preserve-3d;transition:transform .55s ease;cursor:pointer;border-radius:10px}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;border-radius:10px;backface-visibility:hidden;overflow:hidden;border:1px solid rgba(107,63,160,.3)}
.fc-front{background:var(--bg2)}.fc-back{transform:rotateY(180deg);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;gap:12px}
.fc-front img{width:100%;height:100%;object-fit:cover;display:block;border-radius:10px}
.fc-front.inverted img{transform:rotate(180deg)}
.fc-orientation{position:absolute;top:8px;left:0;right:0;text-align:center;font-family:'Cinzel','Palatino Linotype',serif;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--purple-light);background:rgba(26,15,36,.75);padding:4px 0;pointer-events:none}
.fc-tap-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:'Cinzel','Palatino Linotype',serif;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(196,168,224,.5)}
.fc-back-name{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:1rem;color:var(--gold-light);line-height:1.3}
.fc-back-orient{font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-light)}
.fc-back-meaning{font-size:.88rem;color:var(--text-dim);font-style:italic;line-height:1.6}
.fc-loading{display:flex;align-items:center;gap:8px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.65rem;color:var(--text-dim);letter-spacing:.1em}
.fc-choices{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px}
.fc-choice{background:rgba(36,21,53,.6);border:1px solid rgba(107,63,160,.25);border-radius:6px;padding:12px 16px;cursor:pointer;transition:all .2s;font-size:.9rem;color:var(--text-main);text-align:left;font-family:'EB Garamond',Georgia,serif}
.fc-choice:hover{border-color:var(--purple-light);background:rgba(107,63,160,.15)}
.fc-choice.correct{border-color:#7abf7a;background:rgba(122,191,122,.1);color:#7abf7a;pointer-events:none}
.fc-choice.wrong{border-color:#c97070;background:rgba(201,112,112,.1);color:#c97070;pointer-events:none}
.fc-choice.reveal{border-color:#7abf7a;background:rgba(122,191,122,.08);color:#7abf7a;pointer-events:none}
.fc-result{text-align:center;font-family:'Cinzel','Palatino Linotype',serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 0}
.fc-result.good{color:#7abf7a}.fc-result.bad{color:#c97070}
.fc-actions{display:flex;gap:10px;width:100%;max-width:420px;justify-content:center}
.fc-score{font-family:'Cinzel','Palatino Linotype',serif;font-size:.72rem;color:var(--text-dim);letter-spacing:.1em;text-align:center}
.fc-score span{color:var(--gold)}
.interp-wrap{display:flex;flex-direction:column;gap:20px;max-width:600px;margin:0 auto;padding:16px 0}
.interp-card-row{display:flex;gap:16px;align-items:flex-start}
.interp-thumb{width:110px;flex-shrink:0;aspect-ratio:2/3;border-radius:6px;overflow:hidden;border:1px solid rgba(107,63,160,.3)}
.interp-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.interp-thumb.inverted img{transform:rotate(180deg)}
.interp-card-info{flex:1}
.interp-card-name{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:1.1rem;color:var(--gold-light);margin-bottom:4px}
.interp-card-orient{font-family:'Cinzel','Palatino Linotype',serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-light);margin-bottom:12px}
.orient-toggle{display:flex;gap:8px}
.otoggle-btn{padding:5px 14px;border-radius:20px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(107,63,160,.3);color:var(--text-dim);background:none;transition:all .2s}
.otoggle-btn.active{background:rgba(107,63,160,.2);border-color:var(--purple-light);color:var(--gold-light)}
.interp-textarea{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(107,63,160,.35);border-radius:6px;padding:12px 14px;color:var(--text-main);font-family:'EB Garamond',Georgia,serif;font-size:1rem;line-height:1.6;resize:vertical;min-height:110px;outline:none;transition:border-color .2s}
.interp-textarea:focus{border-color:var(--purple-light)}.interp-textarea::placeholder{color:var(--text-dim);font-style:italic}
.feedback-box{background:rgba(36,21,53,.7);border:1px solid rgba(107,63,160,.3);border-radius:8px;padding:20px;line-height:1.7;font-size:.95rem}
.feedback-box h4{font-family:'Cinzel','Palatino Linotype',serif;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.feedback-section{margin-bottom:16px}.feedback-section:last-child{margin-bottom:0}
.fb-label{font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--purple-light);margin-bottom:6px}
.fb-text{color:var(--text-dim);font-style:italic;line-height:1.7}
.pick-card-list{display:flex;flex-direction:column;gap:6px;max-height:420px;overflow-y:auto}
.pick-card-row{display:flex;align-items:center;gap:12px;background:rgba(36,21,53,.5);border:1px solid rgba(107,63,160,.2);border-radius:6px;padding:8px 12px;cursor:pointer;transition:all .2s}
.pick-card-row:hover{border-color:var(--gold);background:rgba(107,63,160,.15)}
.pick-card-thumb{width:38px;flex-shrink:0;aspect-ratio:2/3;border-radius:3px;overflow:hidden;border:1px solid rgba(107,63,160,.3)}
.pick-card-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.pick-card-row-name{font-family:'Cinzel','Palatino Linotype',serif;font-size:.82rem;color:var(--text-main);letter-spacing:.04em}
.pick-card-row-suit{font-size:.72rem;color:var(--purple-light);font-style:italic;margin-top:2px}
/* Card of the Day */
.cotd-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;padding:16px 0;max-width:560px;margin:0 auto}
.cotd-date{font-family:'Cinzel','Palatino Linotype',serif;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--purple-light);text-align:center}
.cotd-card-row{display:flex;gap:20px;align-items:flex-start;width:100%}
.cotd-thumb{width:130px;flex-shrink:0;aspect-ratio:2/3;border-radius:8px;overflow:hidden;border:1px solid rgba(201,168,76,.3);box-shadow:0 0 30px rgba(107,63,160,.2)}
.cotd-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.cotd-header{flex:1;padding-top:4px}
.cotd-name{font-family:'Cinzel Decorative','Palatino Linotype',serif;font-size:clamp(1rem,3vw,1.4rem);color:var(--gold-light);line-height:1.3;margin-bottom:6px;text-shadow:0 0 20px rgba(201,168,76,.3)}
.cotd-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.cotd-badge{padding:3px 10px;border-radius:20px;font-family:'Cinzel','Palatino Linotype',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(107,63,160,.4);color:var(--purple-light);background:rgba(107,63,160,.1)}
.cotd-sections{width:100%;display:flex;flex-direction:column;gap:14px}
.cotd-section{background:rgba(36,21,53,.6);border:1px solid rgba(107,63,160,.25);border-radius:8px;padding:16px 18px}
.cotd-section-label{font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.cotd-section-text{font-size:.95rem;color:var(--text-dim);font-style:italic;line-height:1.7}
.cotd-reflection{background:rgba(122,31,61,.15);border:1px solid rgba(122,31,61,.3);border-radius:8px;padding:16px 18px;width:100%}
.cotd-reflection-label{font-family:'Cinzel','Palatino Linotype',serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px}
.cotd-reflection-text{font-size:1rem;color:var(--text-main);font-style:italic;line-height:1.7}
.cotd-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 0}

<script>
window.addEventListener('firebaseReady', function() {
const {useState,useEffect,useCallback,useRef,useMemo}=React;
const API_KEY_KEY='tarot-learner-apikey';
const MAJOR=["The Fool","The Magician","The High Priestess","The Empress","The Emperor","The Hierophant","The Lovers","The Chariot","Strength","The Hermit","Wheel of Fortune","Justice","The Hanged Man","Death","Temperance","The Devil","The Tower","The Star","The Moon","The Sun","Judgement","The World"];
const SUITS=["Wands","Cups","Swords","Pentacles"];
const RANKS=["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"];
const ALL_CARDS=[...MAJOR.map(n=>({name:n,suit:"Major Arcana",type:"major"})),...SUITS.flatMap(s=>RANKS.map(r=>({name:`${r} of ${s}`,suit:s,type:"minor"})))];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── Firestore storage (cross-device, no size limit) ──
const {doc,setDoc,getDoc,deleteDoc,collection,getDocs}=window._firestoreOps;
const db=window._db;

async function loadAllCards(){
  try{
    const snap=await getDocs(collection(db,'cards'));
    const cards={};
    snap.forEach(d=>{cards[d.id.replace(/__dot__/g,'.')]=d.data();});
    return cards;
  }catch(e){console.error('loadAllCards',e);return{};}
}
async function saveCard(name,data){
  try{
    const id=name.replace(/\./g,'__dot__');
    await setDoc(doc(db,'cards',id),data);
  }catch(e){console.error('saveCard',e);alert('Error saving card: '+e.message);}
}
async function deleteCard(name){
  try{
    const id=name.replace(/\./g,'__dot__');
    await deleteDoc(doc(db,'cards',id));
  }catch(e){console.error('deleteCard',e);}
}

function compressImage(file,maxDim=700){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(maxDim/img.width,maxDim/img.height,1);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',0.78));
    };img.src=url;
  });
}

async function callClaude(messages,apiKey,maxTokens=600){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens,messages})
  });
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  return(d.content?.[0]?.text||'').trim();
}

async function identifyCard(base64,apiKey){
  const b64=base64.split(',')[1];
  const text=await callClaude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:'This is a tarot card. Respond with ONLY the card name. Standard names like "The Fool", "The High Priestess", "Ace of Wands". If unrecognisable: UNKNOWN'}]}],apiKey,60);
  if(!text||text==='UNKNOWN')return null;
  const n=text.toLowerCase().replace(/[^a-z0-9 ]/g,'');
  return ALL_CARDS.find(c=>c.name.toLowerCase().replace(/[^a-z0-9 ]/g,'')=== n)||null;
}
async function getMeanings(cardName,isReversed,apiKey){
  return callClaude([{role:'user',content:`Give 3 brief key meanings for ${cardName} ${isReversed?'reversed':'upright'} in tarot. Comma-separated short phrases only, no numbering.`}],apiKey,120);
}
async function getAllChoices(cardName,isReversed,allNames,apiKey){
  const pool=shuffle(allNames.filter(n=>n!==cardName)).slice(0,6).join(', ');
  const orient=isReversed?'reversed':'upright';
  const prompt=`You are writing answer options for a tarot flashcard quiz.

The card is: ${cardName} (${orient})

Write exactly 4 answer options — one correct, three plausible but wrong.
Rules:
- Every option must be exactly 4-6 words long, no more, no less
- Every option must follow the same pattern: 2-3 comma-separated short phrases
- Do NOT make the correct answer longer or more detailed than the others
- Wrong answers should draw from the energy of these cards: ${pool}
- Return ONLY the 4 options separated by | with CORRECT: prefix on the right one

Example format:
new beginnings, leap of faith, potential|CORRECT: folly, innocence, fresh start|endings, completion, final steps|conflict, struggle, inner turmoil`;
  const text=await callClaude([{role:'user',content:prompt}],apiKey,200);
  const parts=text.split('|').map(s=>s.trim()).filter(Boolean);
  let correct='',wrongs=[];
  parts.forEach(p=>{
    if(p.startsWith('CORRECT:')){correct=p.replace('CORRECT:','').trim();}
    else{wrongs.push(p);}
  });
  if(!correct){correct=parts[0]||'';wrongs=parts.slice(1);}
  return{correct,choices:shuffle([{text:correct,isCorrect:true},...wrongs.slice(0,3).map(t=>({text:t,isCorrect:false}))])};
}
async function getSingleCardFeedback(cardName,isReversed,interpretation,apiKey){
  const prompt=`You are a thoughtful tarot teacher. A student is interpreting ${cardName} ${isReversed?'reversed':'upright'}.\n\nTheir interpretation: "${interpretation}"\n\nRespond in this exact format with sections separated by |||:\nACCURACY: [1-2 sentences on accuracy vs traditional meaning]\nTHEMES: [1-2 sentences on suit/element themes captured or missed]\nMISSED: [1-2 sentences on important nuances they missed]\nENCOURAGEMENT: [1 warm sentence of encouragement]`;
  const text=await callClaude([{role:'user',content:prompt}],apiKey,400);
  const parts=text.split('|||').map(s=>s.trim());
  const extract=(label,s)=>{const m=s.match(new RegExp(`${label}:\\s*(.+)`,'s'));return m?m[1].trim():s;};
  return{accuracy:extract('ACCURACY',parts[0]||''),themes:extract('THEMES',parts[1]||''),missed:extract('MISSED',parts[2]||''),encouragement:extract('ENCOURAGEMENT',parts[3]||'')};
}
async function getSpreadFeedback(spreadImage,context,interpretation,apiKey){
  const b64=spreadImage.split(',')[1];
  const prompt=`You are a wise and warm tarot reader and teacher. The student has photographed a tarot spread.${context?`\n\nContext: "${context}"`:''}

Student's interpretation: "${interpretation}"

Respond with four sections separated by |||:
CARDS: [Identify visible cards and positions]
READING: [Your full reading of the spread]
FEEDBACK: [Specific feedback on their interpretation]
DEEPEN: [2-3 questions or themes to explore further]`;
  const text=await callClaude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:prompt}]}],apiKey,800);
  const parts=text.split('|||').map(s=>s.trim());
  const extract=(label,s)=>{const m=s.match(new RegExp(`${label}:\\s*(.+)`,'s'));return m?m[1].trim():s;};
  return{cards:extract('CARDS',parts[0]||''),reading:extract('READING',parts[1]||''),feedback:extract('FEEDBACK',parts[2]||''),deepen:extract('DEEPEN',parts[3]||'')};
}

async function getCardDetails(cardName,apiKey){
  const prompt=`You are an expert tarot reader. Give a rich reference reading for ${cardName}.

Respond with exactly these sections separated by |||:
UPRIGHT: [2-3 sentences on upright meaning]
REVERSED: [2-3 sentences on reversed meaning]
ASSOCIATIONS: [zodiac sign, element, numerology number — format exactly as: Zodiac: X | Element: X | Number: X]
SYMBOLS: [2-3 sentences on key symbols and imagery in this card]
REFLECTION: [One evocative question or prompt for contemplation — make it poetic and personal]`;
  const text=await callClaude([{role:'user',content:prompt}],apiKey,500);
  const parts=text.split('|||').map(s=>s.trim());
  const extract=(label,s)=>{const m=s.match(new RegExp(`${label}:\\s*(.+)`,'s'));return m?m[1].trim():s;};
  const assocRaw=extract('ASSOCIATIONS',parts[2]||'');
  const zodiac=(assocRaw.match(/Zodiac:\s*([^|]+)/)||[])[1]?.trim()||'';
  const element=(assocRaw.match(/Element:\s*([^|]+)/)||[])[1]?.trim()||'';
  const number=(assocRaw.match(/Number:\s*([^|]+)/)||[])[1]?.trim()||'';
  return{upright:extract('UPRIGHT',parts[0]||''),reversed:extract('REVERSED',parts[1]||''),zodiac,element,number,symbols:extract('SYMBOLS',parts[3]||''),reflection:extract('REFLECTION',parts[4]||'')};
}

async function getCardOfTheDay(cardName,apiKey){
  const prompt=`You are a wise tarot reader offering a Card of the Day reading for ${cardName}.

Respond with exactly these sections separated by |||:
UPRIGHT: [2-3 sentences on upright meaning]
REVERSED: [2-3 sentences on reversed meaning]
ASSOCIATIONS: [Format exactly as: Zodiac: X | Element: X | Number: X]
SYMBOLS: [2-3 sentences on key symbols and imagery]
DAILY: [3-4 sentences of personalised daily guidance — what energy this card brings today, what to be aware of, how to work with it]
REFLECTION: [One poetic, evocative question to carry through the day]`;
  const text=await callClaude([{role:'user',content:prompt}],apiKey,600);
  const parts=text.split('|||').map(s=>s.trim());
  const extract=(label,s)=>{const m=s.match(new RegExp(`${label}:\\s*(.+)`,'s'));return m?m[1].trim():s;};
  const assocRaw=extract('ASSOCIATIONS',parts[2]||'');
  const zodiac=(assocRaw.match(/Zodiac:\s*([^|]+)/)||[])[1]?.trim()||'';
  const element=(assocRaw.match(/Element:\s*([^|]+)/)||[])[1]?.trim()||'';
  const number=(assocRaw.match(/Number:\s*([^|]+)/)||[])[1]?.trim()||'';
  return{upright:extract('UPRIGHT',parts[0]||''),reversed:extract('REVERSED',parts[1]||''),zodiac,element,number,symbols:extract('SYMBOLS',parts[3]||''),daily:extract('DAILY',parts[4]||''),reflection:extract('REFLECTION',parts[5]||'')};
}

function CardOfTheDayTab({savedCards,apiKey}){
  const uploadedCards=useMemo(()=>Object.entries(savedCards).map(([name,data])=>({name,...data})),[savedCards]);
  const [card,setCard]=useState(null);
  const [details,setDetails]=useState(null);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{
    if(!uploadedCards.length)return;
    const today=new Date();
    const seed=today.getFullYear()*10000+((today.getMonth()+1)*100)+today.getDate();
    const idx=seed%uploadedCards.length;
    setCard(uploadedCards[idx]);
    setDetails(null);
  },[uploadedCards.length]);
  useEffect(()=>{
    if(!card||!apiKey)return;
    setLoading(true);
    getCardOfTheDay(card.name,apiKey).then(d=>{setDetails(d);setLoading(false);}).catch(e=>{console.error(e);setLoading(false);});
  },[card&&card.name]);

  const dateStr=today.toLocaleDateString('en-IE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

    React.createElement('div',{className:'sph-icon'},'☽'),
    React.createElement('h3',null,'No cards in your deck'),
    React.createElement('p',null,'Add cards via the Library tab to draw a card of the day.')

    React.createElement('div',{className:'cotd-date'},dateStr),

      React.createElement('div',{className:'spinner',style:{width:24,height:24,borderWidth:3}}),
      React.createElement('p',null,'Reading the cards…')

        React.createElement('div',{className:'cotd-section-label'},"Today's Guidance"),

        React.createElement('div',{className:'cotd-section-text'},details.symbols)
      ),
      React.createElement('div',{className:'cotd-reflection'},
        React.createElement('div',{className:'cotd-reflection-label'},'Reflection for today'),

}

function StudyTab({savedCards,apiKey}){
  const [mode,setMode]=useState(null);const [orientation,setOrientation]=useState(null);
  const [queue,setQueue]=useState([]);const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);const [meaning,setMeaning]=useState('');const [loadingMeaning,setLoadingMeaning]=useState(false);
  const [choices,setChoices]=useState([]);const [loadingChoices,setLoadingChoices]=useState(false);
  const [answered,setAnswered]=useState(null);const [score,setScore]=useState({correct:0,total:0});const [resultMsg,setResultMsg]=useState('');
  const uploadedCards=useMemo(()=>Object.entries(savedCards).map(([name,data])=>({name,...data})),[savedCards]);
  const count=uploadedCards.length;
  function buildQueue(orient){return shuffle(uploadedCards).map(card=>{let rev=false;if(orient==='reversed')rev=true;else if(orient==='mixed')rev=Math.random()<0.5;return{...card,isReversed:rev};});}
  function startSession(orient){setOrientation(orient);const q=buildQueue(orient);setQueue(q);setIdx(0);setFlipped(false);setMeaning('');setChoices([]);setAnswered(null);setScore({correct:0,total:0});setResultMsg('');setMode('fc');loadChoices(q[0]);}
  async function loadChoices(cardObj){
    setLoadingChoices(true);setChoices([]);
    const allNames=uploadedCards.map(c=>c.name);
    try{
      const {correct,choices}=await getAllChoices(cardObj.name,cardObj.isReversed,allNames,apiKey);
      setChoices(choices);
      setMeaning(correct);
    }catch(e){console.error(e);}
    setLoadingChoices(false);
  }
  async function handleFlip(){setFlipped(true);if(!meaning&&!loadingMeaning){setLoadingMeaning(true);try{const m=await getMeanings(queue[idx].name,queue[idx].isReversed,apiKey);setMeaning(m);}catch{}setLoadingMeaning(false);}}
  function handleAnswer(choice){setAnswered(choice);setScore(s=>({correct:s.correct+(choice.isCorrect?1:0),total:s.total+1}));setResultMsg(choice.isCorrect?'Well read.':'Not quite — flip the card to see the meaning.');if(!flipped&&choice.isCorrect)setFlipped(true);}
  async function nextCard(){const next=idx+1;if(next>=queue.length){const q=buildQueue(orientation);setQueue(q);setIdx(0);setFlipped(false);setMeaning('');setAnswered(null);setResultMsg('');loadChoices(q[0]);}else{setIdx(next);setFlipped(false);setMeaning('');setAnswered(null);setResultMsg('');loadChoices(queue[next]);}}
  if(!count)return React.createElement('div',{className:'sph'},React.createElement('div',{className:'sph-icon'},'☽'),React.createElement('h3',null,'Your deck awaits'),React.createElement('p',null,'Upload cards first to begin studying.'));
  if(!mode)return React.createElement('div',{className:'study-select'},
    React.createElement('h2',null,'Choose your practice'),
    React.createElement('div',{className:'mode-cards'},
      [{orient:'upright',icon:'☀',title:'Upright',desc:'Practice the classic upright meanings of each card.'},{orient:'reversed',icon:'☽',title:'Reversed',desc:'Deepen your knowledge with inverted card meanings.'},{orient:'mixed',icon:'✦',title:'Mixed',desc:'A full reading — upright and reversed cards combined.'}].map(m=>
        React.createElement('div',{key:m.orient,className:'mode-card',onClick:()=>startSession(m.orient)},React.createElement('div',{className:'mode-icon'},m.icon),React.createElement('h3',null,m.title),React.createElement('p',null,m.desc))
      )
    ),
    React.createElement('div',{className:'fc-score'},React.createElement('span',null,count),' cards in your deck')
  );
  const current=queue[idx];if(!current)return null;
  return React.createElement('div',{className:'fc-wrap'},
    React.createElement('div',{className:'fc-meta'},`Card ${(idx%queue.length)+1} of ${queue.length}`),
    React.createElement('div',{className:'fc-score'},'Score: ',React.createElement('span',null,score.correct),' / ',React.createElement('span',null,score.total)),
    React.createElement(FlashCard,{card:current,isReversed:current.isReversed,flipped,onFlip:handleFlip,meaning,loadingMeaning}),
    loadingChoices?React.createElement('div',{className:'fc-loading'},React.createElement('div',{className:'spinner'}),React.createElement('span',null,'Drawing choices…'))
    :choices.length>0&&React.createElement('div',{className:'fc-choices'},
      choices.map((c,i)=>React.createElement('button',{key:i,className:`fc-choice${answered?(c.isCorrect?' correct':c===answered?' wrong':c.isCorrect?' reveal':''):''}`,onClick:()=>!answered&&handleAnswer(c)},c.text))
    ),
    resultMsg&&React.createElement('div',{className:`fc-result ${answered?.isCorrect?'good':'bad'}`},resultMsg),
    answered&&React.createElement('div',{className:'fc-actions'},
      React.createElement('button',{className:'btn btn-p',onClick:nextCard},'Next Card'),
      React.createElement('button',{className:'btn btn-g',onClick:()=>{setMode(null);setOrientation(null);}},'Change Mode')
    )
  );
}
